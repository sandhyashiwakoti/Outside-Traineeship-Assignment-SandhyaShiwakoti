<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main Profile Card -->
    <div class="card">
      <!-- Left Side -->
      <div class="card-left">
        <div class="avatar">
          <img
            class="avatar-image"
            src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=200&h=200&fit=crop&crop=face"
            alt="Jessica Potter"
          />
        </div>

        <div class="user-name">Jessica Potter</div>
        <div class="user-role">Visual Artist</div>

        <div class="buttons">
          <button class="btn">Follow</button>
          <button class="btn">Message</button>
        </div>
      </div>

      <!-- Right Side -->
      <div class="card-right">
        <div class="block">
          <div class="number">523</div>
          <div class="label">Posts</div>
        </div>
        <div class="block">
          <div class="number">1387</div>
          <div class="label">Likes</div>
        </div>
        <div class="block">
          <div class="number">146</div>
          <div class="label">Followers</div>
        </div>
      </div>
    </div>
  </body>
</html>
