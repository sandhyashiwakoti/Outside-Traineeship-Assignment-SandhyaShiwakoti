<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chessboard Task</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chessboard-container">
      <div class="board">
        <!-- Top Labels -->
        <div></div>
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
        <div>F</div>
        <div>G</div>
        <div>H</div>
        <div></div>

        <!-- Row 8 -->
        <div>8</div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box white piece">
          <img src="../images/royal.png" alt="king" />
        </div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div>8</div>

        <!-- Row 7 -->
        <div>7</div>
        <div class="square-box black"></div>
        <div class="square-box white piece">
          <img src="../images/horse.png" alt="knight" />
        </div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div>7</div>

        <!-- Row 6 -->
        <div>6</div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div>6</div>

        <!-- Row 5 -->
        <div>5</div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div>5</div>

        <!-- Row 4 -->
        <div>4</div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div>4</div>

        <!-- Row 3 -->
        <div>3</div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div>3</div>

        <!-- Row 2 -->
        <div>2</div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div>2</div>

        <!-- Row 1 -->
        <div>1</div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div class="square-box black"></div>
        <div class="square-box gray"></div>
        <div>1</div>

        <!-- Bottom Labels -->
        <div></div>
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
        <div>E</div>
        <div>F</div>
        <div>G</div>
        <div>H</div>
        <div></div>
      </div>
    </div>
  </body>
</html>
