<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Layout</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- Page Layout -->
    <div class="page">
      <!-- Header -->
      <header class="box-content">Header</header>

      <!-- Navigation -->
      <nav class="nav-content box-content">Navigation</nav>

      <!-- Main Content -->
      <div class="mid-section">
        <!-- Left Sidebar -->
        <aside class="left-bar box-content">Sidebar Left</aside>

        <!-- Main Content -->
        <main class="main-content box-content">Main</main>

        <!-- Right Sidebar -->
        <aside class="right-bar box-content">Sidebar Right</aside>
      </div>

      <!-- Footer -->
      <footer class="box-content">Footer</footer>
    </div>
  </body>
</html>
